services:
  # Banco de Dados PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: biketracker-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mynet

  # Aplicação Java 17 (Backend)
  app:
    build: ./app
    container_name: app
    expose:
      - "8080" # Não expõe mais para o host — só o Nginx acessa internamente
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    networks:
      - mynet

  # Aplicação Angular (Frontend)
  front:
    build: ./app-front
    container_name: biketracker-front
    expose:
      - "80" # Só o Nginx acessa internamente
    restart: unless-stopped
    networks:
      - mynet

  # Nginx — Proxy reverso com HTTPS
  nginx:
    image: nginx:alpine
    container_name: biketracker-nginx
    ports:
      - "80:80"   # Redireciona HTTP → HTTPS
      - "443:443" # HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro  # Certificados SSL
    depends_on:
      - front
      - app
    restart: unless-stopped
    networks:
      - mynet

volumes:
  postgres-data:
    driver: local

networks:
  mynet:
    driver: bridge