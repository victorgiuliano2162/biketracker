events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  # Redireciona todo tráfego HTTP para HTTPS
  server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
  }

  # Servidor HTTPS principal
  server {
    listen 443 ssl;
    server_name localhost;

    # Certificados SSL
    # Para produção: substitua pelos caminhos do seu certificado real (ex: Let's Encrypt)
    # Para desenvolvimento: use certificados autoassinados gerados com o comando no README
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Boas práticas de segurança SSL
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Frontend Angular — qualquer rota que não seja /api
    location / {
      proxy_pass         http://front:80;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      # Necessário para o roteamento do Angular funcionar corretamente
      proxy_intercept_errors on;
      error_page 404 = /index.html;
    }

    # Backend Spring Boot — rotas que começam com /api
    location /api/ {
      proxy_pass         http://app:8080/api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}